name: Response time expectations

on:
  issues:
    types: [opened]

# No workflow-level permissions; the single job below grants only what it needs.
permissions: {}

# Per-issue concurrency: keeps any future re-trigger on the same issue from
# racing itself. The group key uses github.event.issue.number, a
# server-generated integer that is not user-controllable.
concurrency:
  group: response-time-${{ github.event.issue.number }}
  cancel-in-progress: false

# Security note: this workflow uses actions/github-script (Node, not shell),
# and untrusted issue payload fields (title, body, label names, etc.) are
# never interpolated into a `run:` block. The only ${{ }} expression in this
# file is github.event.issue.number above, a GitHub-generated integer.
# Untrusted data is accessed via JS property reads inside the github-script
# step.
# Reference: https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

jobs:
  comment:
    name: Post first-response expectation
    runs-on: ubuntu-latest
    permissions:
      issues: write  # for github.rest.issues.createComment on the new issue
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const MEMBER_ASSOCIATIONS = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);

            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (issue.user && issue.user.type === 'Bot') {
              core.info('Issue opened by a bot; skipping.');
              return;
            }

            if (MEMBER_ASSOCIATIONS.has(issue.author_association)) {
              core.info(`Issue opened by ${issue.author_association}; skipping.`);
              return;
            }

            // Issue forms in this repo apply exactly one label, so labels[0]
            // is the right choice. Manually-opened issues may have no label.
            const labels = (issue.labels || []).map(l => l.name);
            const primaryLabel = labels[0] || null;

            // One paginated GraphQL search pulls projectItems and the first
            // 100 comments for each candidate, so this runs in O(pages) calls
            // instead of O(2N). We only look at the first 100 comments per
            // candidate — no issue in this repo has buried a maintainer reply
            // deeper than that.
            async function queueAhead(label) {
              if (!label) return 0;
              const q = `repo:${owner}/${repo} is:issue is:open label:"${label}" created:<${issue.created_at}`;

              let total = 0, onProject = 0, memberResponded = 0, count = 0;
              let cursor = null;

              while (true) {
                const r = await github.graphql(
                  `query($q: String!, $cursor: String) {
                     search(query: $q, type: ISSUE, first: 100, after: $cursor) {
                       pageInfo { hasNextPage endCursor }
                       nodes {
                         ... on Issue {
                           number
                           projectItems(first: 1) { totalCount }
                           comments(first: 100) {
                             nodes {
                               authorAssociation
                               author { __typename }
                             }
                           }
                         }
                       }
                     }
                   }`,
                  { q, cursor }
                );

                for (const it of r.search.nodes) {
                  if (!it || it.number === issue.number) continue;
                  total++;
                  if (it.projectItems && it.projectItems.totalCount > 0) {
                    onProject++;
                    continue;
                  }
                  const hasMember = (it.comments?.nodes || []).some(c =>
                    MEMBER_ASSOCIATIONS.has(c.authorAssociation) &&
                    c.author && c.author.__typename !== 'Bot'
                  );
                  if (hasMember) {
                    memberResponded++;
                    continue;
                  }
                  count++;
                }

                if (!r.search.pageInfo.hasNextPage) break;
                cursor = r.search.pageInfo.endCursor;
              }

              core.info(`queueAhead(${label}): total=${total} on_project=${onProject} member_responded=${memberResponded} counted=${count}`);
              return count;
            }

            try {
              const ahead = await queueAhead(primaryLabel);

              let queueLine = '';
              if (primaryLabel && ahead === 1) {
                queueLine = `There is currently 1 other open ${primaryLabel} issue ahead of this one.`;
              } else if (primaryLabel && ahead > 1) {
                queueLine = `There are currently ${ahead} other open ${primaryLabel} issues ahead of this one.`;
              }

              const lines = [`Thanks for filing.`, ``];
              if (queueLine) lines.push(queueLine, ``);
              lines.push(
                `PyPI support is one paid staffer, plus volunteers, plus whatever part-time hours other PSF staff have to give. Often that's zero. If you'd like to help fund more staffing, the PSF takes donations at https://www.python.org/psf/donations/. Either way, someone will get to your request eventually.`
              );

              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number, body: lines.join('\n'),
              });
            } catch (err) {
              core.warning(`Failed to post response-time comment: ${err.message}`);
            }
